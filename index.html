<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BMI Calculator</title>
</head>
<body>
    <div class="container">
        <h1>Body Mass Index (BMI) Calculator</h1>
        <label for="height" id="height-label">Your Height (cm):</label>
        <input type="number" id="height-input" placeholder="Enter your height in cm">
        <label for="weight" id="weight-label">Your Weight (kg):</label>
        <input type="number" id="weight-input" placeholder="Enter your Weight in kg">
        <button type="button">Compute BMI</button>
        <input id="result">
        <label for="weightCondition" id="weightCondition-label">Weight Condition:</label>
    </div>
    <script src="index.js"></script>
</body>
</html>
